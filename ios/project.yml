name: Look
targets:
  Look:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Look
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sladebot.look
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_KEY_CFBundleDisplayName: "Look"
      INFOPLIST_KEY_UIRequiredDeviceCapabilities: "arm64"
    info:
      path: Look/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            100.86.254.112:
              NSExceptionAllowsInsecureHTTPLoads: true
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSPhotoLibraryAddUsageDescription: "Look saves photos you download from your library into your Photos app."
  LookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - LookTests
    dependencies:
      - target: Look
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sladebot.lookTests
      GENERATE_INFOPLIST_FILE: YES
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Look.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Look"
schemes:
  Look:
    build:
      targets:
        Look: all
    test:
      targets:
        - LookTests
