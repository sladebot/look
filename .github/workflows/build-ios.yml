name: Build iOS App
on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: |
          curl -sL https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip \
            -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: /tmp/xcodegen/xcodegen/bin/xcodegen generate

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          set +e
          find . -name "*.xcodeproj" -exec ls -d {} \; 2>/dev/null
          xcrun simctl list devicetypes | grep -i "iphone" | head -3

      - name: Build Archive
        working-directory: ios
        run: |
          PROJECT="Look"
          SCHEME="${PROJECT}"

          # Clean previous build
          xcodebuild clean \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            2>&1 | tee -a build.log || true

          # Build the app bundle
          xcodebuild build \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee -a build.log

          # Find the .app bundle
          APP_PATH=$(find build/DerivedData -name "${PROJECT}.app" -type d 2>/dev/null | head -1)
          if [ -z "${APP_PATH}" ]; then
            echo "ERROR: .app not found in DerivedData"
            ls -la build/DerivedData/*/Build/Products/Release-iphoneos/ 2>/dev/null || true
            exit 1
          fi
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"
          echo "APP_NAME=${PROJECT}.app" >> "$GITHUB_ENV"

          # Create a zip of the .app for distribution
          cd "$(dirname "${APP_PATH}")"
          zip -r "${PROJECT}.zip" "${PROJECT}.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Look-build
          path: ios/build/DerivedData/Build/Products/Release-iphoneos/Look.zip
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/build/DerivedData/Build/Products/Release-iphoneos/Look.zip
          generate_release_notes: true
