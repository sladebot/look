<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Message sent — Look Support</title>
<meta name="robots" content="noindex" />
<style>
  :root {
    --canvas: #131316;
    --surface: #1c1c21;
    --text: #f5f5f7;
    --text-2: #c9c9d1;
    --separator: #3a3a42;
    --accent: #a79bff;
    --success: #4cc27e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--canvas);
    color: var(--text-2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }
  .card {
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--separator);
    border-radius: 12px;
    padding: 36px;
    text-align: center;
  }
  .check {
    width: 44px; height: 44px;
    margin: 0 auto 16px;
    border-radius: 999px;
    background: rgba(76, 194, 126, 0.14);
    color: var(--success);
    display: grid; place-items: center;
    font-size: 22px;
  }
  h1 { font-size: 22px; color: var(--text); margin: 0 0 8px; letter-spacing: -0.01em; }
  p { margin: 0 0 20px; }
  a {
    color: var(--accent);
  }
</style>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">✓</div>
    <h1>Message sent</h1>
    <p>Thanks for writing. Your message is on its way to the developer's inbox — expect a reply at the email address you provided, usually within 2 business days.</p>
    <a href="./">Back to Look Support</a>
  </main>
</body>
</html>
